[defaults]
inventory = ./inventory.ini
host_key_checking = False
# `stdout_callback = yaml` was removed in community.general 12.0.0.
# The built-in default callback now takes `result_format = yaml` for
# the same output (ansible-core 2.13+).
result_format = yaml
interpreter_python = /usr/bin/python3
retry_files_enabled = False
nocows = True
forks = 1

[ssh_connection]
pipelining = True
