[defaults]
inventory = ./inventory.ini
host_key_checking = False
# `stdout_callback = yaml` was removed in community.general 12.0.0.
# The built-in default callback now takes `result_format = yaml` for
# the same output (ansible-core 2.13+).
result_format = yaml
interpreter_python = /usr/bin/python3
retry_files_enabled = False
nocows = True
forks = 1

[ssh_connection]
pipelining = True
# Disable SSH multiplexing — on macOS we've seen its control sockets
# hang across runs, manifesting as "Timeout waiting for privilege
# escalation prompt" or an indefinite stall at Gathering Facts. For a
# single-host play the per-task reconnect cost is trivial.
ssh_args = -o ControlMaster=no -o ControlPath=none -o StrictHostKeyChecking=no
