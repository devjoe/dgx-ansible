---
# Single source of truth for DGX Spark state.
#
# Edit this file, run `make deploy`, and Ansible converges the box to
# match. All speed/behaviour knobs live here — do NOT hand-edit
# /etc/systemd/system/ollama.service.d/ on the DGX, that file is
# rendered from `roles/ollama/templates/ollama-override.conf.j2`
# and will be overwritten on the next deploy.

# --- Remote workspace ---
# Pre-existing dir on the DGX where the operator keeps Ollama-related
# scripts and the uv Python env. Ansible treats this as the canonical
# human-facing surface:
#   {{ remote_workdir }}/override.conf.mirror   — readable copy of
#                                                   the systemd override
#   {{ remote_workdir }}/benchmarks/*.json      — results from `make benchmark`
#   {{ remote_workdir }}/README.md              — points at this repo
# Pre-existing files (.venv/, main.py, pyproject.toml, uv.lock, etc.)
# are NOT touched.
remote_workdir: "/home/devjoe/Projects/Ollama"

# --- Network ---
ollama_host: "0.0.0.0:11434"           # bind all interfaces (LAN reach)
ollama_origins: "*"                    # CORS allowlist for POST /api/chat
lan_cidr: "192.168.99.0/24"            # ufw scope for port 11434

# --- Runtime ---
ollama_keep_alive: "24h"               # how long after last request before unload
ollama_num_parallel: 2                 # concurrent generation requests
ollama_max_loaded_models: 2            # keep 2 models hot before evicting

# --- Speed flags (DEFAULT OFF — set true to A/B benchmark) ---
# Known regressions on GB10 / Qwen3 family; see:
#   ollama/ollama#12432, #11949, #9683, #6769
# Flip to true, run `make deploy && make benchmark`, compare to baseline.
ollama_flash_attention: false
ollama_kv_cache_type: "fp16"           # alt: "q8_0" or "q4_0"

# --- Models (idempotent pull list) ---
# Adding an entry here pulls it on next deploy. Removing does NOT delete
# the on-disk weights — that's manual via `ollama rm <tag>` on the host.
ollama_models:
  - qwen3.5:latest                     # fb-reader baseline (9.7B dense, ~31 tok/s)
  - qwen3.6:35b-a3b                    # MoE, 35B total / 3B active, ~24 GB
  # - qwen3:32b                         # dense 32B, ~15 tok/s — uncomment if wanted
  # - gemma3:27b                        # Google alternative family

# --- Benchmark (used by benchmark.yml) ---
bench_model: "qwen3.5:latest"
bench_num_ctx: 4096
bench_runs: 3
bench_prompt: >-
  分類這篇貼文：今天去爬山，風景很好，拍了很多照片，但下山時膝蓋有點痛。
  回傳 JSON {commercial, political, emotional, personal}，每個 0.0-1.0 之間。

# --- vLLM Tier B daemon -----------------------------------------------
# Encodes recipes/Intel_Qwen3.6-35B-A3B-int4-AutoRound.yaml — Intel
# AutoRound INT4 base + z-lab DFlash speculative decoding (k=8),
# language-model-only (no vision; client-side image prefetch path
# in fb-reader is bypassed).
# fb-reader points at `http://gx10.local:{{ vllm_port }}/v1/chat/completions`.
vllm_user: "devjoe"
vllm_workdir: "/home/devjoe/Projects/vllm"

# Network: vLLM listens directly on the LAN port.
vllm_host: "0.0.0.0"
vllm_port: 8000

# Model + serving knobs (per Intel AutoRound recipe).
vllm_model: "Intel/Qwen3.6-35B-A3B-int4-mixed-AutoRound"
vllm_served_name: "qwen3.6-35b"
vllm_max_model_len: 131072
vllm_max_num_batched_tokens: 32768
vllm_max_num_seqs: 4
# Recipe defaults to 0.8, but DGX Ollama keeps ~32GB GPU mem warm
# (qwen3.6:35b-a3b at keep_alive=24h). 0.65 leaves room for both;
# bump back to 0.8 if Ollama gets evicted from the box.
vllm_gpu_memory_utilization: "0.65"
vllm_quantization: "gptq"

# Multimodal toggle. Recipe says --language-model-only (text + DFlash spec
# decode). Set false to ALSO load the vision tower — DFlash drafter is
# text-only, so vision requests likely bypass spec decoding (per-request).
vllm_language_model_only: false
vllm_max_images_per_prompt: 4

# Speculative decoding (DFlash). num_tokens=8 = recipe's "k=8".
vllm_speculative_model: "z-lab/Qwen3.6-35B-A3B-DFlash"
vllm_speculative_num_tokens: 8

# Floor versions — bump deliberately when A/B testing a newer release.
vllm_version_floor: "0.7.0"
vllm_transformers_floor: "4.46.0"

# --- Observability stack (roles/observability/) ----------------------------
# Activated by playbooks/deploy-observability.yml. Defaults live in
# roles/observability/defaults/main.yml — only override here when you
# need to deviate (e.g. bump a container image or change retention).
#
# Secrets (Grafana admin password, Telegram bot token for v2) live in
# group_vars/dgx.yml.vault and are loaded at playbook time via
# `--vault-password-file` or `--ask-vault-pass`.
#
# 90-day retention is large enough to seed v2's threshold derivation
# from real σ rather than guesses (per design doc v1 success criteria).
obs_grafana_admin_password: "{{ vault_grafana_admin_password | default('please-set-via-vault') }}"

# v2 Telegram alerting — v1 leaves these unset. Defined here so the
# variable lookup doesn't fail if v2 alert templates are pre-rendered.
obs_telegram_bot_token: "{{ vault_telegram_bot_token | default('') }}"
obs_telegram_chat_id: "{{ vault_telegram_chat_id | default('') }}"
