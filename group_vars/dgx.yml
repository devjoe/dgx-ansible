---
# Single source of truth for DGX Spark state.
#
# Edit this file, run `make deploy`, and Ansible converges the box to
# match. All speed/behaviour knobs live here — do NOT hand-edit
# /etc/systemd/system/ollama.service.d/ on the DGX, that file is
# rendered from `roles/ollama/templates/ollama-override.conf.j2`
# and will be overwritten on the next deploy.

# --- Remote workspace ---
# Pre-existing dir on the DGX where the operator keeps Ollama-related
# scripts and the uv Python env. Ansible treats this as the canonical
# human-facing surface:
#   {{ remote_workdir }}/override.conf.mirror   — readable copy of
#                                                   the systemd override
#   {{ remote_workdir }}/benchmarks/*.json      — results from `make benchmark`
#   {{ remote_workdir }}/README.md              — points at this repo
# Pre-existing files (.venv/, main.py, pyproject.toml, uv.lock, etc.)
# are NOT touched.
remote_workdir: "/home/devjoe/Projects/Ollama"

# --- Network ---
ollama_host: "0.0.0.0:11434"           # bind all interfaces (LAN reach)
ollama_origins: "*"                    # CORS allowlist for POST /api/chat
lan_cidr: "192.168.99.0/24"            # ufw scope for port 11434

# --- Runtime ---
ollama_keep_alive: "24h"               # how long after last request before unload
ollama_num_parallel: 2                 # concurrent generation requests
ollama_max_loaded_models: 2            # keep 2 models hot before evicting

# --- Speed flags (DEFAULT OFF — set true to A/B benchmark) ---
# Known regressions on GB10 / Qwen3 family; see:
#   ollama/ollama#12432, #11949, #9683, #6769
# Flip to true, run `make deploy && make benchmark`, compare to baseline.
ollama_flash_attention: false
ollama_kv_cache_type: "fp16"           # alt: "q8_0" or "q4_0"

# --- Models (idempotent pull list) ---
# Adding an entry here pulls it on next deploy. Removing does NOT delete
# the on-disk weights — that's manual via `ollama rm <tag>` on the host.
ollama_models:
  - qwen3.5:latest                     # fb-reader baseline (9.7B dense, ~31 tok/s)
  - qwen3.6:35b-a3b                    # MoE, 35B total / 3B active, ~24 GB
  # - qwen3:32b                         # dense 32B, ~15 tok/s — uncomment if wanted
  # - gemma3:27b                        # Google alternative family

# --- Benchmark (used by benchmark.yml) ---
bench_model: "qwen3.5:latest"
bench_num_ctx: 4096
bench_runs: 3
bench_prompt: >-
  分類這篇貼文：今天去爬山，風景很好，拍了很多照片，但下山時膝蓋有點痛。
  回傳 JSON {commercial, political, emotional, personal}，每個 0.0-1.0 之間。

# --- vLLM Tier B daemon -----------------------------------------------
# vLLM serves the multimodal Tier B classifier for fb-reader. The
# image-sanitizing reverse proxy on `vllm_public_port` re-encodes images
# via Pillow before they reach vLLM, so FB CDN URLs whose bytes Pillow's
# default loader rejects (animated WebP, signed-token 403 HTML, SVG
# placeholders) get sanitized or silently dropped instead of crashing
# the whole request. fb-reader continues to point at
# `http://gx10.local:8000/v1/chat/completions`.
vllm_user: "devjoe"
vllm_workdir: "/home/devjoe/Projects/vllm"

# Network: sanitizer is public, vLLM itself is localhost-only.
vllm_public_host: "0.0.0.0"
vllm_public_port: 8000
vllm_internal_port: 8001

# Model + serving knobs.
vllm_model: "Qwen/Qwen3.6-35B-A3B-AWQ"
vllm_served_name: "qwen3.6:35b-a3b"
vllm_max_model_len: 16384
vllm_gpu_memory_utilization: "0.85"
vllm_max_images_per_prompt: 4

# Floor versions — bumped to pull in Pillow / transformers fixes for FB-
# style CDN image edge cases. `state: latest` in the role respects these
# as minimums; bump them here when you want to A/B a newer release.
vllm_version_floor: "0.7.0"
vllm_transformers_floor: "4.46.0"
vllm_pillow_floor: "11.0.0"

# Sanitizer tuning. The defaults are conservative — re-encoding at q85
# keeps text legible in screenshots while keeping the data URI under
# vLLM's image-token budget.
vllm_sanitizer_fetch_timeout: "8.0"
vllm_sanitizer_jpeg_quality: 85
vllm_sanitizer_max_edge: 1280
