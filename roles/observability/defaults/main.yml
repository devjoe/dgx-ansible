---
# DGX-side observability stack defaults. Override in group_vars/dgx.yml.

# --- Versions / images ---------------------------------------------------
obs_victoriametrics_image: "victoriametrics/victoria-metrics:v1.115.0"
obs_grafana_image: "grafana/grafana:11.4.0"
obs_dcgm_exporter_image: "nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04"
obs_node_exporter_image: "quay.io/prometheus/node-exporter:v1.8.2"
obs_vmagent_image: "victoriametrics/vmagent:v1.115.0"

# --- Ports (all bind on 0.0.0.0 unless noted) ----------------------------
# VM serves both the write API (/api/v1/write) and the read API (/select/...)
# on the same port. Grafana queries it via http://victoriametrics:8428.
obs_vm_port: 8428
obs_grafana_port: 3000
obs_dcgm_port: 9400
obs_node_exporter_port: 9100
obs_vmagent_port: 8429
# vLLM exposes /metrics natively on its main port (8000) — no separate
# exporter port. Recorded here for vmagent scrape config readability.
obs_vllm_metrics_port: "{{ vllm_port }}"

# --- Paths ---------------------------------------------------------------
obs_data_root: "/srv/observability"
obs_vm_data_dir: "{{ obs_data_root }}/vm-data"
obs_grafana_data_dir: "{{ obs_data_root }}/grafana-data"
obs_grafana_provisioning_dir: "{{ obs_data_root }}/grafana-provisioning"
obs_grafana_dashboards_dir: "{{ obs_data_root }}/grafana-dashboards"
obs_canary_remote_dir: "{{ obs_data_root }}/canary"
obs_textfile_dir: "{{ obs_data_root }}/textfile"

# --- TSDB retention ------------------------------------------------------
# 90d picked over VM's 31d default to give v2 thresholds room for
# seasonal baselines. ~1 GB per 90d at this scrape rate.
obs_vm_retention: "90d"

# --- Canary --------------------------------------------------------------
# Canary on the DGX runs the same TS suite as on the Mac. The canary
# scripts are rsynced from the controller's local-inference checkout to
# obs_canary_remote_dir at deploy time (same pattern as dashboards) —
# we don't clone on the DGX because local-inference is private.
# obs_canary_node_install:
#   "apt"  → apt install nodejs npm (default)
#   "skip" → assume node is already installed
obs_canary_node_install: "apt"
obs_canary_user: "{{ vllm_user }}"
obs_canary_local_src: "{{ lookup('env', 'HOME') }}/Projects/local-inference/scripts/canary/"
obs_canary_workdir: "{{ obs_canary_remote_dir }}"
# Daily 03:00 to match Mac canary; staggered by Mac-vs-DGX clock skew is
# acceptable since they're independent regression tests.
obs_canary_oncalendar: "*-*-* 03:00:00"

# --- Grafana auth --------------------------------------------------------
# Anonymous viewer + admin password from vault — single-network single-dev
# tradeoff per design doc.
obs_grafana_anon_enabled: true
obs_grafana_anon_org_role: "Viewer"
# obs_grafana_admin_password is loaded from group_vars/dgx.yml.vault as
# vault_grafana_admin_password (see deploy-observability.yml playbook).

# --- Dashboard source ----------------------------------------------------
# Dashboards are owned by the local-inference repo (domain knowledge).
# We rsync them straight from the Ansible controller's working copy
# instead of cloning on the target — local-inference is private and the
# DGX has no GitHub credentials. Override if your checkout lives elsewhere.
obs_dashboards_local_src: "{{ lookup('env', 'HOME') }}/Projects/local-inference/obs/dashboards/"

# --- Mac peer (the canary running on the Mac writes textfile that
#     node_exporter on the Mac scrapes; we list mac here only so the
#     vmagent scrape config can include it as a fallback target). ------
obs_mac_host: "192.168.99.10"
obs_mac_node_exporter_port: 9100
