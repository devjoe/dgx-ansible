---
# frcooper/ollama-exporter has no upstream Docker image, so we install
# the Go toolchain and `go install` it. Built once, then run as a
# systemd-managed binary. Polls /api/ps + /api/tags — no inline proxy
# on the request path (per design Q4).

- name: Ensure golang-go is installed
  ansible.builtin.apt:
    name: golang-go
    state: present
    update_cache: true

- name: Build ollama-exporter via go install
  ansible.builtin.command:
    cmd: "go install {{ obs_ollama_exporter_repo }}"
  args:
    creates: "/root/go/bin/ollama-exporter"
  environment:
    GOPATH: "/root/go"
    GOBIN: "/root/go/bin"

- name: Symlink ollama-exporter to /usr/local/bin
  ansible.builtin.file:
    src: "/root/go/bin/ollama-exporter"
    dest: "/usr/local/bin/ollama-exporter"
    state: link
    force: true

- name: Render ollama-exporter systemd unit
  ansible.builtin.template:
    src: ollama-exporter.service.j2
    dest: /etc/systemd/system/observability-ollama-exporter.service
    mode: "0644"
  notify: restart ollama-exporter

- name: Enable + start ollama-exporter
  ansible.builtin.systemd:
    name: observability-ollama-exporter
    enabled: true
    state: started
    daemon_reload: true
