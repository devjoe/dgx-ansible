---
# Canary on the DGX runs the same TS suite as on the Mac. We rsync the
# scripts from the controller (same private-repo workaround as
# dashboards) and need node/npm + a systemd timer on the host.

- name: Ensure node + npm are installed (apt)
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: present
    update_cache: true
  when: obs_canary_node_install == "apt"

- name: Verify canary source exists on the controller
  ansible.builtin.stat:
    path: "{{ obs_canary_local_src }}"
  register: obs_canary_src_stat
  delegate_to: localhost
  become: false

- name: Fail clearly if canary source is missing
  ansible.builtin.fail:
    msg: >-
      Canary source {{ obs_canary_local_src }} not found on the
      Ansible controller. Override obs_canary_local_src in
      group_vars/dgx.yml if your local-inference checkout lives elsewhere.
  when: not obs_canary_src_stat.stat.exists

- name: Sync canary scripts to DGX
  ansible.posix.synchronize:
    src: "{{ obs_canary_local_src }}"
    dest: "{{ obs_canary_remote_dir }}/"
    delete: true
    recursive: true

- name: Render canary service unit
  ansible.builtin.template:
    src: canary.service.j2
    dest: /etc/systemd/system/observability-canary.service
    mode: "0644"
  notify: reload systemd for canary

- name: Render canary timer unit
  ansible.builtin.template:
    src: canary.timer.j2
    dest: /etc/systemd/system/observability-canary.timer
    mode: "0644"
  notify: reload systemd for canary

- name: Enable + start canary timer
  ansible.builtin.systemd:
    name: observability-canary.timer
    enabled: true
    state: started
    daemon_reload: true
