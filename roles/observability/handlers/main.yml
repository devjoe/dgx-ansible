---
- name: restart victoriametrics
  ansible.builtin.systemd:
    name: observability-victoriametrics
    state: restarted
    daemon_reload: true

- name: restart grafana
  ansible.builtin.systemd:
    name: observability-grafana
    state: restarted
    daemon_reload: true

- name: restart dcgm-exporter
  ansible.builtin.systemd:
    name: observability-dcgm-exporter
    state: restarted
    daemon_reload: true

- name: restart node-exporter
  ansible.builtin.systemd:
    name: observability-node-exporter
    state: restarted
    daemon_reload: true

- name: restart vmagent
  ansible.builtin.systemd:
    name: observability-vmagent
    state: restarted
    daemon_reload: true

- name: reload systemd for canary
  ansible.builtin.systemd:
    daemon_reload: true
