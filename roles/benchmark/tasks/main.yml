---
# Benchmark: run the configured prompt N times against Ollama and
# compute eval tok/s. Designed to be run AFTER `site.yml` has converged
# the host — this role only makes HTTP calls, no systemd/become needed.
#
# Output ends with a debug block printing per-run + mean tok/s so the
# operator can eyeball A/B deltas between flag settings.

- name: Force-unload the benchmark model so num_ctx takes effect
  ansible.builtin.uri:
    url: "http://localhost:11434/api/generate"
    method: POST
    body_format: json
    body:
      model: "{{ bench_model }}"
      keep_alive: 0
    status_code: [200, 404]     # 404 if model was never loaded — fine

- name: Wait for model to fully unload (/api/ps shows empty)
  ansible.builtin.uri:
    url: "http://localhost:11434/api/ps"
    return_content: true
  register: ps_check
  retries: 20
  delay: 1
  until: ps_check.json.models | default([]) | length == 0

- name: Read effective env vars from rendered override
  ansible.builtin.slurp:
    src: /etc/systemd/system/ollama.service.d/override.conf
  register: override_slurp

- name: Decode effective flag state
  ansible.builtin.set_fact:
    effective_override: "{{ override_slurp.content | b64decode }}"

- name: Run benchmark prompt {{ bench_runs }} time(s)
  ansible.builtin.uri:
    url: "http://localhost:11434/api/chat"
    method: POST
    body_format: json
    body:
      model: "{{ bench_model }}"
      messages:
        - role: system
          content: "/no_think\n你是 Facebook 貼文分類專家。只輸出 JSON。"
        - role: user
          content: "{{ bench_prompt }}"
      stream: false
      think: false
      options:
        temperature: 0
        num_predict: 200
        num_ctx: "{{ bench_num_ctx }}"
    return_content: true
  register: bench_results
  loop: "{{ range(1, bench_runs + 1) | list }}"

- name: Build per-run tok/s summary
  ansible.builtin.set_fact:
    runs_summary: "{{ runs_summary | default([]) + [summary_entry] }}"
  vars:
    ec: "{{ item.json.eval_count | int }}"
    ed_ns: "{{ item.json.eval_duration | int }}"
    ed_s: "{{ (item.json.eval_duration | int) / 1000000000 }}"
    tps: "{{ (ec | float) / (ed_s | float) if (ed_s | float) > 0 else 0 }}"
    summary_entry:
      run: "{{ ansible_loop.index }}"
      load_ms: "{{ (item.json.load_duration | int) // 1000000 }}"
      prompt_ms: "{{ (item.json.prompt_eval_duration | int) // 1000000 }}"
      prompt_tokens: "{{ item.json.prompt_eval_count | int }}"
      eval_ms: "{{ ed_ns | int // 1000000 }}"
      eval_tokens: "{{ ec }}"
      tok_per_sec: "{{ '%.1f' | format(tps | float) }}"
  loop: "{{ bench_results.results }}"
  loop_control:
    extended: true   # exposes ansible_loop.index (1-based)
    label: "run {{ ansible_loop.index }}"

- name: Compute mean tok/s
  ansible.builtin.set_fact:
    mean_tok_per_sec: >-
      {{
        '%.1f' | format(
          (runs_summary
            | map(attribute='tok_per_sec')
            | map('float')
            | sum) / (runs_summary | length)
        )
      }}

- name: Show benchmark result
  ansible.builtin.debug:
    msg: |
      ================ DGX Spark Benchmark ================
      Model        : {{ bench_model }}
      num_ctx      : {{ bench_num_ctx }}
      Runs         : {{ bench_runs }}

      --- Effective override.conf ---
      {{ effective_override }}
      --- Per-run timings ---
      {% for r in runs_summary %}
      run {{ r.run }}: load {{ r.load_ms }}ms | prompt {{ r.prompt_ms }}ms / {{ r.prompt_tokens }}tok | eval {{ r.eval_ms }}ms / {{ r.eval_tokens }}tok | {{ r.tok_per_sec }} tok/s
      {% endfor %}

      --- Mean ---
      eval throughput: {{ mean_tok_per_sec }} tok/s
      =====================================================

# Persist the result as a timestamped JSON blob in the operator's
# workdir so multiple benchmark runs accumulate for later A/B compare.

- name: Ensure benchmarks dir exists
  ansible.builtin.file:
    path: "{{ remote_workdir }}/benchmarks"
    state: directory
    mode: "0755"

- name: Append this run to benchmarks log
  ansible.builtin.copy:
    dest: "{{ remote_workdir }}/benchmarks/{{ ansible_facts['date_time']['iso8601_basic_short'] }}.json"
    mode: "0644"
    content: "{{ bench_record | to_nice_json }}"
  vars:
    bench_record:
      timestamp: "{{ ansible_facts['date_time']['iso8601'] }}"
      model: "{{ bench_model }}"
      num_ctx: "{{ bench_num_ctx }}"
      runs: "{{ bench_runs }}"
      effective_override: "{{ effective_override }}"
      per_run: "{{ runs_summary }}"
      mean_tok_per_sec: "{{ mean_tok_per_sec }}"
