---
# Manage the vLLM Tier B daemon for fb-reader.
#
# Encodes recipes/Intel_Qwen3.6-35B-A3B-int4-AutoRound.yaml — Intel
# AutoRound INT4 + z-lab DFlash speculative decoding (k=8),
# language-model-only. fb-reader's client-side image prefetch path
# is bypassed (no vision in this profile).

- name: Ensure vLLM workdir exists
  ansible.builtin.file:
    path: "{{ vllm_workdir }}"
    state: directory
    owner: "{{ vllm_user }}"
    group: "{{ vllm_user }}"
    mode: "0755"

- name: Ensure Python + venv + dev headers are installed
  ansible.builtin.apt:
    name:
      - python3-venv
      - python3-pip
      # python3-dev — vLLM pulls fastsafetensors as sdist; building its
      # C extension needs Python.h.
      - python3-dev
      - build-essential
    state: present
    update_cache: true

- name: Create vLLM venv if missing
  ansible.builtin.command:
    cmd: "python3 -m venv {{ vllm_workdir }}/.venv"
    creates: "{{ vllm_workdir }}/.venv/bin/python"
  become_user: "{{ vllm_user }}"

- name: Pin pip
  ansible.builtin.command:
    cmd: "{{ vllm_workdir }}/.venv/bin/pip install --upgrade pip"
  changed_when: false
  become_user: "{{ vllm_user }}"

# Pin floor versions so we can bump deliberately. Can be overridden for
# pre-merge PR testing (e.g. Gemma4 MTP assistants).
- name: Install / upgrade vLLM stack
  ansible.builtin.pip:
    name: "{{ vllm_pip_packages | default([('vllm>=' + vllm_version_floor), ('transformers>=' + vllm_transformers_floor)]) }}"
    virtualenv: "{{ vllm_workdir }}/.venv"
    state: latest
    extra_args: "--upgrade-strategy eager"
  become_user: "{{ vllm_user }}"
  notify: restart vllm

- name: Optionally install InstantTensor for faster weight loading
  ansible.builtin.pip:
    name:
      - instanttensor
    virtualenv: "{{ vllm_workdir }}/.venv"
    state: latest
  become_user: "{{ vllm_user }}"
  when: vllm_load_format | default('') == 'instanttensor'
  notify: restart vllm

- name: Render vllm.service
  ansible.builtin.template:
    src: vllm.service.j2
    dest: /etc/systemd/system/vllm.service
    mode: "0644"
  notify: restart vllm

- name: Open firewall for vLLM port (LAN only)
  community.general.ufw:
    rule: allow
    from_ip: "{{ lan_cidr }}"
    port: "{{ vllm_port }}"
    proto: tcp
  when: ansible_facts.services['ufw.service'] is defined or
        (ansible_facts.packages['ufw'] is defined)
  ignore_errors: true

- name: Enable + start vllm
  ansible.builtin.systemd:
    name: vllm
    enabled: true
    state: started
    daemon_reload: true

- name: Apply pending restarts before health check
  ansible.builtin.meta: flush_handlers

- name: Health check — vLLM /v1/models responds 200
  ansible.builtin.uri:
    url: "http://localhost:{{ vllm_port }}/v1/models"
    return_content: true
  register: vllm_health
  retries: 30
  delay: 5
  until: vllm_health.status == 200
