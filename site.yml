---
# Top-level playbook: converge the DGX Spark to the desired state for
# the fb-reader stack — Ollama (Tier A) + vLLM with image-sanitizing
# proxy (Tier B). Idempotent — safe to run repeatedly. A second
# consecutive run should report `changed=0`.

- name: Configure DGX Spark for Ollama + vLLM hosting
  hosts: dgx
  become: true
  gather_facts: true
  roles:
    - ollama
    - vllm
