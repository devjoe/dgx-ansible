---
# Verify the vLLM Tier B daemon is healthy and accepts the data-URI
# image format that fb-reader now sends. Read-only — does not change
# host state.
#
# What this exercises:
# 1. GET /v1/models — basic up-check.
# 2. POST /v1/chat/completions with text only — confirms the model
#    still answers.
# 3. POST /v1/chat/completions with a tiny JPEG data URI — confirms
#    vLLM accepts the `data:image/jpeg;base64,...` format that
#    fb-reader's content-script prefetch produces. Pre-prefetch
#    fb-reader sent raw FB CDN URLs which would 403 on this DGX.

- name: Benchmark + sanity-check vLLM Tier B
  hosts: dgx
  become: false
  gather_facts: false
  vars:
    base_url: "http://localhost:{{ vllm_port }}"
    # 1×1 white JPEG — the smallest valid JPEG that PIL can decode.
    # Used to verify vLLM accepts data-URI images without crashing.
    sample_data_uri: "data:image/jpeg;base64,"
  tasks:
    - name: GET /v1/models
      ansible.builtin.uri:
        url: "{{ base_url }}/v1/models"
        return_content: true
      register: models_resp

    - name: Show served model
      ansible.builtin.debug:
        msg: "vLLM serves: {{ models_resp.json.data | map(attribute='id') | list }}"

    - name: Text-only chat completion (no images)
      ansible.builtin.uri:
        url: "{{ base_url }}/v1/chat/completions"
        method: POST
        body_format: json
        body:
          model: "{{ vllm_served_name }}"
          messages:
            - role: user
              content: "Reply with exactly the word 'ok'."
          max_tokens: 16
          temperature: 0
        return_content: true
      register: text_resp

    - name: Show text-only response
      ansible.builtin.debug:
        msg: "{{ text_resp.json.choices[0].message.content }}"

    - name: Data-URI image regression check
      ansible.builtin.uri:
        url: "{{ base_url }}/v1/chat/completions"
        method: POST
        body_format: json
        body:
          model: "{{ vllm_served_name }}"
          messages:
            - role: user
              content:
                - type: text
                  text: "Reply with exactly the word 'ok'."
                - type: image_url
                  image_url:
                    url: "{{ sample_data_uri }}"
          max_tokens: 16
          temperature: 0
        return_content: true
        status_code: 200
      register: data_uri_resp

    - name: Verify vLLM accepted the data URI and produced a response
      ansible.builtin.assert:
        that:
          - data_uri_resp.status == 200
          - data_uri_resp.json.choices[0].message.content is defined
          - data_uri_resp.json.choices[0].message.content | length > 0
        fail_msg: >-
          vLLM data-URI regression: status={{ data_uri_resp.status }}
          body={{ data_uri_resp.content | default('') | truncate(200) }}
        success_msg: "vLLM decoded the JPEG data URI and produced a response."
